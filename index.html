<title>SAP PERMPOON</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1C3A5F;--navy2:#264573;--gold:#C8B289;--goldd:#a8916a;--gold-light:#e0d0b0;
  --cream:#F5F2EC;--white:#fff;--text:#1a2a3a;--mid:#4a6080;--border:#d8cdb8;
  --green:#1a7a3a;--green-bg:#e8f5ec;--red:#8b1a1a;--red-bg:#fff0f0;
  --nav-h:60px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--cream);font-family:"Sarabun",sans-serif;color:var(--text);-webkit-tap-highlight-color:transparent;overflow:hidden}
input,button,select,textarea{font-family:"Sarabun",sans-serif}
button{cursor:pointer;transition:all .12s;border:none}
button:active{transform:scale(.95)}
.hidden{display:none!important}

/* ===== SHELL ===== */
.shell{display:flex;flex-direction:column;height:100svh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* ===== HEADER ===== */
.hdr{background:var(--navy);border-bottom:2px solid var(--gold);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.hdr-logo{height:36px;width:auto}
.hdr-badge{background:rgba(200,178,137,.15);border:1px solid var(--gold);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px}

/* ===== TAB PAGES ===== */
.tab-page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;opacity:0;pointer-events:none;transition:opacity .18s;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 8px)}
.tab-page.active{opacity:1;pointer-events:all}
.tab-body{max-width:480px;margin:0 auto;padding:12px 12px 20px;display:flex;flex-direction:column;gap:10px}

/* ===== BOTTOM NAV ===== */
.bnav{position:absolute;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--navy);border-top:2px solid var(--gold);display:flex;align-items:stretch;z-index:50;padding-bottom:env(safe-area-inset-bottom,0)}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;color:#6a90b8;padding:4px 2px;position:relative;border:none}
.ntab.on{color:var(--gold)}
.ntab.on::before{content:"";position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--gold);border-radius:0 0 3px 3px}
.ntab svg{width:22px;height:22px}
.ntab-lbl{font-size:9px;font-weight:700;letter-spacing:.3px}

/* ===== CARDS ===== */
.card{background:var(--white);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;box-shadow:0 1px 6px rgba(28,58,95,.07)}
.ctitle{font-size:10px;font-weight:700;color:var(--navy2);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:7px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.col{display:flex;flex-direction:column;gap:4px}
.lbl{font-size:11px;color:var(--mid);letter-spacing:.5px;font-weight:600}

/* ===== INPUTS ===== */
.inp{background:var(--cream);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:15px;font-weight:600;width:100%;color:var(--text)}
.inp:focus{outline:2px solid var(--gold);border-color:var(--gold)}
.big{background:var(--cream);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:22px;font-weight:700;font-family:monospace;letter-spacing:5px;width:100%}
.big.c{text-align:center}
.big.xl{font-size:24px;letter-spacing:10px}
.big.sm{font-size:15px;letter-spacing:1px;width:78px}
.big:focus{outline:2px solid var(--gold);border-color:var(--gold)}

/* ===== BUTTONS ===== */
.btn-navy{background:linear-gradient(135deg,var(--navy),var(--navy2));border:none;border-radius:10px;padding:13px;color:#fff;font-size:15px;font-weight:700;letter-spacing:1px;width:100%}
.btn-gold{background:linear-gradient(135deg,var(--goldd),var(--gold));border:none;border-radius:10px;padding:13px;color:#1a0800;font-size:15px;font-weight:700;width:100%}
.btn-green{background:linear-gradient(135deg,#1a6b3a,#27a85a);border:none;border-radius:10px;padding:13px;color:#fff;font-size:15px;font-weight:700;width:100%}
.btn-outline{background:none;border:2px solid var(--navy);border-radius:8px;padding:10px;color:var(--navy);font-size:14px;font-weight:700;width:100%}
.btn-red{background:#c0392b;border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:13px;font-weight:700}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px;font-weight:700;border:none}

/* ===== TYPE GRID ===== */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.tbtn{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:8px 4px;color:var(--mid);display:flex;flex-direction:column;align-items:center;gap:2px}
.tbtn.on{background:var(--navy);border-color:var(--navy);color:#fff}
.tbtn.on .tpr{color:var(--gold-light)}
.tlb{font-size:11px;font-weight:700}
.tpr{font-size:9px;opacity:.7}

/* ===== AMOUNT ROW ===== */
.arow{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.ubtn{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--mid);font-size:14px;font-weight:700}
.ubtn.on{background:var(--navy);border-color:var(--navy);color:#fff}

/* ===== PREV / ERR ===== */
.prev{background:#f0ede6;border:1px dashed var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--mid);text-align:center}
.err{background:var(--red-bg);border:1px solid #e8a0a0;border-radius:6px;padding:8px 12px;color:var(--red);font-size:13px}

/* ===== ACTION BUTTONS ===== */
.action-row{display:flex;gap:6px}
.abtn{flex:1;border:none;border-radius:8px;padding:10px 4px;font-size:12px;font-weight:700;color:#fff}
.abtn.y{background:#c8920a}
.abtn.t{background:#2e7d5e}
.abtn.r{background:#c0392b}

/* ===== BULK ===== */
.bulk-box{background:#f0ede6;border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.bpbtn{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:14px;font-weight:700;color:var(--text)}

/* ===== CREDIT BAR ===== */
.cbar{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-radius:10px;overflow:hidden}
.ci{background:var(--white);padding:10px 14px;text-align:center}
.ci-lbl{font-size:10px;color:var(--mid);letter-spacing:1px}
.ci-val{font-size:17px;font-weight:900;margin-top:2px}

/* ===== TABLE ===== */
.sec{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.sec-head{font-size:13px;font-weight:900;color:var(--navy);padding:2px 0}
.trow{display:grid;grid-template-columns:20px 52px 48px 52px 1fr 40px;gap:4px;align-items:center;border-radius:6px;padding:6px 6px}
.trow.th{background:#f5f2ec}
.trow.th span{font-size:10px;font-weight:700;color:var(--mid)}
.trow.dup{background:#fff3cd}
.trow.win-row{background:var(--green-bg)}
.e-num{font-weight:900;font-size:16px;letter-spacing:3px;color:var(--navy);font-family:monospace;text-align:center}
.e-rate{font-size:12px;color:var(--mid);text-align:center}
.e-win{font-size:12px;font-weight:700;color:var(--green);text-align:center}
.amt-in{background:var(--cream);border:1.5px solid var(--border);border-radius:5px;padding:5px 6px;font-size:14px;font-weight:700;text-align:center;width:100%;color:var(--text)}
.amt-in:focus{border-color:var(--gold);outline:none}
.del-btn{background:var(--red);border:none;border-radius:5px;color:#fff;font-size:11px;padding:5px 6px;font-weight:700}

/* ===== SUMMARY BAR ===== */
.sbar{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;justify-content:space-around;align-items:center;box-shadow:0 1px 6px rgba(28,58,95,.07)}
.sdiv{width:1px;height:28px;background:var(--border)}
.st{display:flex;flex-direction:column;align-items:center;gap:2px}
.stl{font-size:10px;color:var(--mid);letter-spacing:.5px}
.stv{font-size:15px;font-weight:900;color:var(--text)}
.stv.gold{color:var(--goldd)}

/* ===== TS SUMMARY ===== */
.tsrow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px dashed #eee}
.tsrow:last-child{border-bottom:none}

/* ===== CHECK ===== */
.check-btn{background:var(--cream);border:2px solid var(--navy);border-radius:10px;padding:11px;color:var(--navy);font-size:14px;font-weight:700;width:100%}
.check-btn:disabled{opacity:.35;cursor:not-allowed}
.res-box{background:#f0ede6;border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px}
.rrow{display:flex;justify-content:space-between;font-size:14px}
.rdiv{border-top:1px dashed var(--border);margin-top:4px;padding-top:10px;display:flex;justify-content:space-between;align-items:center}

/* ===== DERIVED ===== */
.drow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding-top:6px}
.dtag{text-align:center}
.dtl{font-size:9px;color:var(--mid);margin-bottom:2px}
.dtv{background:#eef3f9;border:1px solid #b0c4d8;border-radius:6px;padding:3px 10px;font-size:14px;font-weight:900;color:var(--navy);letter-spacing:3px;font-family:monospace}

/* ===== SETTINGS ===== */
.set-box{background:#f0ede6;border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px}
.stog{background:none;border:1px solid var(--border);border-radius:6px;color:var(--mid);font-size:11px;padding:4px 10px}

/* ===== BOTTOM SEND BAR ===== */
.send-bar{position:sticky;bottom:0;background:var(--navy);border-top:2px solid var(--gold);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;margin:0 -12px -20px;z-index:20}
.sb-count{color:var(--gold-light);font-size:13px;font-weight:700}
.sb-btn{background:linear-gradient(135deg,#1a6b3a,#27a85a);border:none;border-radius:10px;padding:10px 24px;color:#fff;font-size:15px;font-weight:900}
.sb-btn:disabled{opacity:.5}

/* ===== SLIP PAGE ===== */
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.f-btn{background:var(--cream);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--mid)}
.f-btn.on{background:var(--navy);border-color:var(--navy);color:#fff}
.slip-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:6px;cursor:pointer}
.slip-header{display:flex;justify-content:space-between;align-items:flex-start}
.slip-name{font-size:15px;font-weight:900;color:var(--navy)}
.slip-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.slip-badge.thai{background:#e8f0f8;color:var(--navy)}
.slip-badge.lao{background:#fff3e0;color:#b8600a}
.slip-meta{font-size:12px;color:var(--mid)}
.slip-totals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;background:#f5f2ec;border-radius:8px;padding:8px}
.slip-tot-item{text-align:center}
.slip-tot-lbl{font-size:9px;color:var(--mid)}
.slip-tot-val{font-size:13px;font-weight:900;color:var(--navy)}
.slip-detail{background:#f5f2ec;border-radius:8px;padding:10px;margin-top:4px;display:none;flex-direction:column;gap:4px}
.slip-detail.open{display:flex}
.slip-detail-row{display:flex;justify-content:space-between;font-size:12px}
.empty-state{text-align:center;padding:48px 24px;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-icon{font-size:48px;opacity:.3}
.empty-txt{font-size:14px;color:var(--mid)}
.period-group{display:flex;flex-direction:column;gap:6px}
.period-title{font-size:12px;font-weight:700;color:var(--mid);letter-spacing:1px;padding:4px 0 2px;border-bottom:1px solid var(--border)}
.period-summary{background:var(--navy);border-radius:8px;padding:10px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.ps-item{text-align:center}
.ps-lbl{font-size:9px;color:var(--gold-light)}
.ps-val{font-size:14px;font-weight:900;color:var(--white)}

/* ===== AGENT PAGE ===== */
.agent-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px}
.agent-avatar{width:44px;height:44px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--gold);flex-shrink:0}
.agent-info{flex:1}
.agent-name{font-size:15px;font-weight:900;color:var(--navy)}
.agent-pct{font-size:12px;color:var(--mid)}
.agent-summary{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.agent-stat{background:#f5f2ec;border-radius:6px;padding:6px 10px;text-align:center}
.agent-stat-lbl{font-size:9px;color:var(--mid)}
.agent-stat-val{font-size:14px;font-weight:900;color:var(--navy)}
.agent-actions{display:flex;gap:6px;margin-top:4px}
.add-agent-form{background:#f0ede6;border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a2a3a;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px 16px 32px;display:flex;flex-direction:column;gap:12px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:900;color:var(--navy);text-align:center}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;color:var(--mid);padding:4px}

/* ===== SETTINGS URL ===== */
.url-row{display:flex;gap:6px;align-items:center}







/* When NOT active, dim it */









/* THAI TAB FLOATING */
.ntab-thai {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  background: transparent;
  border: none;
  padding: 0 2px 5px;
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.ntab-thai .ntab-lbl {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.3px;
  color: #6a90b8;
  line-height: 1;
}
.ntab-thai.on .ntab-lbl {
  color: var(--gold);
}
.ntab-thai .thai-float-img {
  position: absolute;
  bottom: 18px;
  width: 56px;
  height: 56px;
  object-fit: contain;
  object-position: center bottom;
  opacity: 0.55;
  transition: opacity 0.15s;
  pointer-events: none;
}
.ntab-thai.on .thai-float-img {
  opacity: 1;
}
/* Push nav content down slightly to give floating room */
.bnav {
  padding-top: 8px;
}
.tab-page {
  bottom: var(--nav-h) !important;
}

    </button>
    <button class="ntab" data-tab="agent" onclick="switchTab('agent')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span class="ntab-lbl">นายหน้า</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== SHARED STATE =====
const LOTTO_TYPES = {
  thai: [
    {id:"3top",   label:"3 ตัวบน",   digits:3, payout:550},
    {id:"3back",  label:"3 ตัวหลัง", digits:3, payout:550},
    {id:"3tod",   label:"3 ตัวโต๊ด", digits:3, payout:110},
    {id:"3bot",   label:"3 ตัวล่าง", digits:3, payout:110},
    {id:"2top",   label:"2 ตัวบน",   digits:2, payout:70},
    {id:"2bot",   label:"2 ตัวล่าง", digits:2, payout:70},
    {id:"run_top",label:"วิ่งบน",    digits:1, payout:3.2},
    {id:"run_bot",label:"วิ่งล่าง",  digits:1, payout:4.2},
  ],
  lao: [
    {id:"3top",   label:"3 ตัวบน",   digits:3, payout:500},
    {id:"3back",  label:"3 ตัวหลัง", digits:3, payout:500},
    {id:"3tod",   label:"3 ตัวโต๊ด", digits:3, payout:100},
    {id:"2top",   label:"2 ตัวบน",   digits:2, payout:65},
    {id:"2bot",   label:"2 ตัวล่าง", digits:2, payout:65},
    {id:"run_top",label:"วิ่งบน",    digits:1, payout:3.0},
    {id:"run_bot",label:"วิ่งล่าง",  digits:1, payout:4.0},
  ]
};
const UNITS = [1,5,10,20,50,100];
const BULK_P = [5,10,20,50,100,500];

// localStorage keys
const SLIPS_KEY = 'sap_slips';
const AGENTS_KEY = 'sap_agents';

function loadSlips(){ try{return JSON.parse(localStorage.getItem(SLIPS_KEY)||'[]')}catch{return[]} }
function saveSlips(d){localStorage.setItem(SLIPS_KEY,JSON.stringify(d))}
function loadAgents(){ try{return JSON.parse(localStorage.getItem(AGENTS_KEY)||'[]')}catch{return[]} }
function saveAgents(d){localStorage.setItem(AGENTS_KEY,JSON.stringify(d))}

function fmt(n){return (+n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2})}
function perms(s){
  if(s.length<=1)return[s];
  const r=new Set();
  for(let i=0;i<s.length;i++){const rest=s.slice(0,i)+s.slice(i+1);perms(rest).forEach(p=>r.add(s[i]+p));}
  return[...r];
}
function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=ok?'#1a3a1a':'#3a1a1a';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== TAB SWITCH =====
const TAB_LABELS = {thai:'หวยไทย',lao:'หวยลาว',slip:'โพยหวย',agent:'นายหน้า'};
function switchTab(tab){
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  // handle both ntab and ntab-featured
  document.querySelectorAll('.ntab, );
  document.getElementById('tab-'+tab).classList.add('active');
  const activeBtn = document.querySelector(`[data-tab="${tab}"]`);
  activeBtn.classList.add('on');
  if(activeBtn.classList.contains('ntab-featured')) activeBtn.classList.remove('off');
  document.getElementById('hdrBadge').textContent=TAB_LABELS[tab];
  if(tab==='slip'){renderSlips();populatePeriods();}
  if(tab==='agent')renderAgents();
}

// ===== LOTTERY ENGINE (shared by Thai & Lao) =====
function makeLotteryApp(containerId, lottoKey){
  const types = LOTTO_TYPES[lottoKey];
  let entries=[], selType=types[0].id, selAmt=10, useCustom=false, showResult=false, showDup=false, flashId=null;

  const container = document.getElementById(containerId);

  function getT(){return types.find(t=>t.id===selType);}
  function getAmt(){return useCustom?(parseInt(custIn.value)||0):selAmt;}

  function getWin(e,p1,b2){
    if(!p1||p1.length!==6)return 0;
    const l3=p1.slice(-3),l2=p1.slice(-2);
    let w=false;
    if(e.typeId==='3top')w=e.number===l3;
    else if(e.typeId==='3back')w=e.number===l3;
    else if(e.typeId==='3tod')w=perms(e.number).includes(l3);
    else if(e.typeId==='3bot')w=e.number===l3;
    else if(e.typeId==='2top')w=e.number===l2;
    else if(e.typeId==='2bot')w=b2.length===2&&e.number===b2;
    else if(e.typeId==='run_top')w=l3.includes(e.number);
    else if(e.typeId==='run_bot')w=b2.length===2&&b2.includes(e.number);
    return w?e.amount*e.payout:0;
  }

  // Build HTML
  container.innerHTML=`
  <!-- ID CARD -->
  <div class="card">
    <div class="ctitle">ข้อมูลโพย</div>
    <div class="row2">
      <div class="col"><label class="lbl">ชื่อลูกค้า</label><input class="inp" id="${lottoKey}-name" placeholder="เช่น สมชาย"></div>
      <div class="col"><label class="lbl">งวดวันที่</label><input class="inp" id="${lottoKey}-period" placeholder="1/3/2569"></div>
    </div>
    <div class="col"><label class="lbl">เครดิต (บาท)</label><input class="inp" id="${lottoKey}-credit" placeholder="0" inputmode="numeric" style="font-size:18px;font-weight:900"></div>
  </div>

  <!-- INPUT CARD -->
  <div class="card">
    <div class="ctitle">เพิ่มรายการ</div>
    <div class="tgrid" id="${lottoKey}-tgrid"></div>
    <div class="col"><label class="lbl" id="${lottoKey}-nlbl">เลข</label><input class="big" id="${lottoKey}-num" inputmode="numeric" autocomplete="off"></div>
    <div class="col"><label class="lbl">จำนวนเงิน</label><div class="arow" id="${lottoKey}-arow"></div></div>
    <div class="prev" id="${lottoKey}-prev"></div>
    <div class="err hidden" id="${lottoKey}-err"></div>
    <button class="btn-navy" id="${lottoKey}-addBtn">＋ เพิ่มรายการ</button>
  </div>

  <!-- BULK CARD -->
  <div class="card hidden" id="${lottoKey}-bulkCard">
    <div class="ctitle">ตั้งราคาทุกรายการพร้อมกัน</div>
    <div class="bulk-box">
      <input class="big c" id="${lottoKey}-bulkIn" inputmode="numeric" placeholder="0" style="font-size:20px;letter-spacing:3px">
      <div class="bgrid" id="${lottoKey}-bgrid"></div>
      <button class="btn-gold" id="${lottoKey}-applyBulk">✓ ใช้ราคานี้กับทุกรายการ</button>
    </div>
  </div>

  <!-- CREDIT BAR -->
  <div class="cbar hidden" id="${lottoKey}-cbar">
    <div class="ci"><div class="ci-lbl">เครดิตคงเหลือ</div><div class="ci-val" id="${lottoKey}-cleft">฿0</div></div>
    <div class="ci"><div class="ci-lbl">ยอดเดิมพัน</div><div class="ci-val" id="${lottoKey}-cbet" style="color:var(--red)">฿0</div></div>
  </div>

  <!-- ACTION ROW -->
  <div class="action-row hidden" id="${lottoKey}-acts">
    <button class="abtn y" id="${lottoKey}-showDup">แสดงเลขซ้ำ</button>
    <button class="abtn t" id="${lottoKey}-remDup">ตัดเลขซ้ำ</button>
    <button class="abtn r" id="${lottoKey}-clearAll">ลบทั้งหมด</button>
  </div>

  <!-- LIST CARD -->
  <div class="card hidden" id="${lottoKey}-listCard">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="ctitle" style="border:none;padding:0" id="${lottoKey}-listTitle">โพย</div>
    </div>
    <div id="${lottoKey}-tbl"></div>
  </div>

  <!-- SUMMARY BAR -->
  <div class="sbar hidden" id="${lottoKey}-sbar">
    <div class="st"><span class="stl">รายการ</span><span class="stv" id="${lottoKey}-sc">0</span></div>
    <div class="sdiv"></div>
    <div class="st"><span class="stl">ยอดแทง</span><span class="stv" id="${lottoKey}-sb">฿0</span></div>
    <div class="sdiv"></div>
    <div class="st"><span class="stl">ถ้าถูกหมด</span><span class="stv gold" id="${lottoKey}-sp">฿0</span></div>
  </div>

  <!-- TYPE SUMMARY CARD -->
  <div class="card hidden" id="${lottoKey}-tsCard">
    <div class="ctitle">สรุปยอดแยกประเภท</div>
    <div id="${lottoKey}-ts"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border)">
      <span style="font-weight:700;font-size:14px">ยอดรวมทั้งหมด</span>
      <span style="font-weight:900;font-size:18px;color:var(--navy)" id="${lottoKey}-grand">฿0</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:var(--mid)" id="${lottoKey}-sendSt"></span>
      <button class="stog" id="${lottoKey}-setTog">⚙ URL</button>
    </div>
    <div class="set-box hidden" id="${lottoKey}-setBox">
      <label class="lbl">Google Apps Script URL</label>
      <input class="inp" id="${lottoKey}-sheetUrl" placeholder="https://script.google.com/macros/s/.../exec" style="font-size:11px">
      <button class="btn-navy" id="${lottoKey}-saveUrl" style="padding:8px;font-size:13px">💾 บันทึก URL</button>
    </div>
  </div>

  <!-- CHECK CARD -->
  <div class="card hidden" id="${lottoKey}-checkCard">
    <div class="ctitle">ตรวจผล</div>
    <div class="col">
      <label class="lbl">รางวัลที่ 1 (6 หลัก)</label>
      <input class="big c xl" id="${lottoKey}-p1" maxlength="6" placeholder="000000" inputmode="numeric" autocomplete="off">
      <div class="drow hidden" id="${lottoKey}-drow">
        <div class="dtag"><div class="dtl">3 หน้า</div><div class="dtv" id="${lottoKey}-df3"></div></div>
        <div class="dtag"><div class="dtl">3 ท้าย</div><div class="dtv" id="${lottoKey}-d3"></div></div>
        <div class="dtag"><div class="dtl">2 ท้าย</div><div class="dtv" id="${lottoKey}-d2"></div></div>
      </div>
    </div>
    <div class="col"><label class="lbl">2 ตัวล่าง</label><input class="big c" id="${lottoKey}-b2" maxlength="2" placeholder="00" inputmode="numeric" autocomplete="off" style="font-size:24px;letter-spacing:8px"></div>
    <button class="check-btn" id="${lottoKey}-checkBtn" disabled>🎯 ตรวจโพย</button>
    <div class="res-box hidden" id="${lottoKey}-resBox">
      <div class="rrow"><span>ยอดแทงทั้งหมด</span><span style="color:var(--red);font-weight:700" id="${lottoKey}-rBet"></span></div>
      <div class="rrow"><span>รางวัลที่ได้</span><span style="color:var(--green);font-weight:700" id="${lottoKey}-rWin"></span></div>
      <div class="rdiv"><span style="font-weight:700;font-size:14px">กำไร/ขาดทุนสุทธิ</span><span style="font-weight:900;font-size:22px" id="${lottoKey}-rNet"></span></div>
    </div>
  </div>

  <!-- BOTTOM SEND BAR -->
  <div class="send-bar hidden" id="${lottoKey}-sendBar">
    <span class="sb-count" id="${lottoKey}-bbCount">0 รายการ</span>
    <button class="sb-btn" id="${lottoKey}-sendBtn">📤 ส่งโพย</button>
  </div>
  `;

  // ---- TYPE GRID ----
  const tg=document.getElementById(`${lottoKey}-tgrid`);
  types.forEach(t=>{
    const b=document.createElement('button');b.className='tbtn'+(t.id===selType?' on':'');b.dataset.id=t.id;
    b.innerHTML=`<span class="tlb">${t.label}</span><span class="tpr">x${t.payout}</span>`;
    b.onclick=()=>{selType=t.id;document.getElementById(`${lottoKey}-num`).value='';hideErr();updTG();updNL();updPrev();};
    tg.appendChild(b);
  });
  function updTG(){document.querySelectorAll(`#${lottoKey}-tgrid .tbtn`).forEach(b=>b.classList.toggle('on',b.dataset.id===selType));}

  // ---- AMOUNT ----
  const ar=document.getElementById(`${lottoKey}-arow`);
  UNITS.forEach(u=>{
    const b=document.createElement('button');b.className='ubtn'+(!useCustom&&selAmt===u?' on':'');b.dataset.u=u;b.textContent=u;
    b.onclick=()=>{selAmt=u;useCustom=false;custIn.value='';updU();updPrev();};ar.appendChild(b);
  });
  const custIn=document.createElement('input');custIn.className='big sm';custIn.placeholder='อื่นๆ';custIn.inputMode='numeric';
  custIn.oninput=()=>{custIn.value=custIn.value.replace(/\D/g,'');useCustom=true;updU();updPrev();};ar.appendChild(custIn);
  function updU(){document.querySelectorAll(`#${lottoKey}-arow .ubtn`).forEach(b=>b.classList.toggle('on',!useCustom&&parseInt(b.dataset.u)===selAmt));}

  // ---- BULK ----
  const bg=document.getElementById(`${lottoKey}-bgrid`);
  BULK_P.forEach(u=>{const b=document.createElement('button');b.className='bpbtn';b.textContent=u;b.onclick=()=>document.getElementById(`${lottoKey}-bulkIn`).value=u;bg.appendChild(b);});
  document.getElementById(`${lottoKey}-applyBulk`).onclick=()=>{
    const v=parseInt(document.getElementById(`${lottoKey}-bulkIn`).value)||0;
    if(!v){toast('กรอกราคาก่อน',false);return;}
    entries.forEach(e=>e.amount=v);renderAll();toast(`ตั้งราคา ฿${fmt(v)} ทุกรายการแล้ว`);
  };

  // ---- HELPERS ----
  function updNL(){
    const t=getT();document.getElementById(`${lottoKey}-nlbl`).textContent=`เลข (${t.digits} หลัก)`;
    const i=document.getElementById(`${lottoKey}-num`);i.maxLength=t.digits;i.placeholder='0'.repeat(t.digits);
  }
  function updPrev(){
    const t=getT(),a=getAmt();
    document.getElementById(`${lottoKey}-prev`).innerHTML=`แทง <b style="color:var(--navy)">฿${fmt(a)}</b> &nbsp;·&nbsp; ถ้าถูก <b style="color:var(--goldd)">฿${fmt(a*t.payout)}</b>`;
  }
  function showErr(m){const e=document.getElementById(`${lottoKey}-err`);e.textContent=m;e.classList.remove('hidden');}
  function hideErr(){document.getElementById(`${lottoKey}-err`).classList.add('hidden');}
  function getDups(){const seen={},d=new Set();entries.forEach(e=>{const k=e.typeId+':'+e.number;if(seen[k])d.add(k);else seen[k]=true;});return d;}

  // ---- ADD ----
  document.getElementById(`${lottoKey}-addBtn`).onclick=addEntry;
  document.getElementById(`${lottoKey}-num`).addEventListener('keydown',e=>{if(e.key==='Enter')addEntry();});
  document.getElementById(`${lottoKey}-num`).oninput=e=>{e.target.value=e.target.value.replace(/\D/g,'');hideErr();};
  function addEntry(){
    hideErr();const t=getT(),num=document.getElementById(`${lottoKey}-num`).value,amt=getAmt();
    if(!/^\d+$/.test(num)||num.length!==t.digits){showErr(`กรุณากรอกตัวเลข ${t.digits} หลัก`);return;}
    if(amt<=0){showErr('กรุณากรอกจำนวนเงิน');return;}
    const e={id:Date.now(),number:num,typeId:selType,typeLabel:t.label,payout:t.payout,amount:amt};
    entries.unshift(e);flashId=e.id;setTimeout(()=>{flashId=null;renderList();},600);
    document.getElementById(`${lottoKey}-num`).value='';
    showResult=false;document.getElementById(`${lottoKey}-resBox`).classList.add('hidden');
    renderAll();document.getElementById(`${lottoKey}-num`).focus();
  }

  // ---- ACTIONS ----
  document.getElementById(`${lottoKey}-showDup`).onclick=()=>{
    showDup=!showDup;document.getElementById(`${lottoKey}-showDup`).textContent=showDup?'ซ่อนเลขซ้ำ':'แสดงเลขซ้ำ';
    renderList();const d=getDups();toast(d.size>0?`พบเลขซ้ำ ${d.size} รายการ`:'ไม่พบเลขซ้ำ',d.size===0);
  };
  document.getElementById(`${lottoKey}-remDup`).onclick=()=>{
    const seen={};entries=entries.filter(e=>{const k=e.typeId+':'+e.number;if(seen[k])return false;seen[k]=true;return true;});
    showDup=false;document.getElementById(`${lottoKey}-showDup`).textContent='แสดงเลขซ้ำ';renderAll();toast('ตัดเลขซ้ำแล้ว');
  };
  document.getElementById(`${lottoKey}-clearAll`).onclick=()=>{
    if(!entries.length)return;if(confirm('ลบโพยทั้งหมด?')){entries=[];showResult=false;document.getElementById(`${lottoKey}-resBox`).classList.add('hidden');renderAll();}
  };

  // ---- CHECK ----
  document.getElementById(`${lottoKey}-p1`).oninput=e=>{
    e.target.value=e.target.value.replace(/\D/g,'');updDerived();showResult=false;
    document.getElementById(`${lottoKey}-resBox`).classList.add('hidden');
    document.getElementById(`${lottoKey}-checkBtn`).disabled=e.target.value.length!==6;
  };
  document.getElementById(`${lottoKey}-b2`).oninput=e=>{e.target.value=e.target.value.replace(/\D/g,'');showResult=false;document.getElementById(`${lottoKey}-resBox`).classList.add('hidden');};
  function updDerived(){
    const p1=document.getElementById(`${lottoKey}-p1`).value,row=document.getElementById(`${lottoKey}-drow`);
    if(p1.length===6){document.getElementById(`${lottoKey}-df3`).textContent=p1.slice(0,3);document.getElementById(`${lottoKey}-d3`).textContent=p1.slice(-3);document.getElementById(`${lottoKey}-d2`).textContent=p1.slice(-2);row.classList.remove('hidden');}
    else row.classList.add('hidden');
  }
  document.getElementById(`${lottoKey}-checkBtn`).onclick=()=>{
    if(document.getElementById(`${lottoKey}-p1`).value.length!==6)return;
    showResult=true;renderResult();renderList();
  };
  function renderResult(){
    const p1=document.getElementById(`${lottoKey}-p1`).value,b2=document.getElementById(`${lottoKey}-b2`).value;
    const tb=entries.reduce((s,e)=>s+e.amount,0),tw=entries.reduce((s,e)=>s+getWin(e,p1,b2),0),net=tw-tb;
    document.getElementById(`${lottoKey}-rBet`).textContent=`−฿${fmt(tb)}`;
    document.getElementById(`${lottoKey}-rWin`).textContent=`+฿${fmt(tw)}`;
    const rn=document.getElementById(`${lottoKey}-rNet`);rn.textContent=(net>=0?'+':'')+`฿${fmt(net)}`;rn.style.color=net>=0?'var(--green)':'var(--red)';
    document.getElementById(`${lottoKey}-resBox`).classList.remove('hidden');
  }

  // ---- SETTINGS ----
  document.getElementById(`${lottoKey}-setTog`).onclick=()=>{
    const b=document.getElementById(`${lottoKey}-setBox`);b.classList.toggle('hidden');
    document.getElementById(`${lottoKey}-sheetUrl`).value=localStorage.getItem(`sheetUrl_${lottoKey}`)||'';
  };
  document.getElementById(`${lottoKey}-saveUrl`).onclick=()=>{
    localStorage.setItem(`sheetUrl_${lottoKey}`,document.getElementById(`${lottoKey}-sheetUrl`).value.trim());
    document.getElementById(`${lottoKey}-setBox`).classList.add('hidden');toast('บันทึก URL แล้ว ✓');
  };

  // ---- SEND ----
  document.getElementById(`${lottoKey}-sendBtn`).onclick=async()=>{
    const url=localStorage.getItem(`sheetUrl_${lottoKey}`)||'';
    if(!url){document.getElementById(`${lottoKey}-setBox`).classList.remove('hidden');toast('กรุณาตั้งค่า URL ก่อน',false);return;}
    if(!entries.length){toast('ยังไม่มีรายการ',false);return;}
    const name=document.getElementById(`${lottoKey}-name`).value.trim()||'ไม่ระบุ';
    const period=document.getElementById(`${lottoKey}-period`).value.trim()||'ไม่ระบุ';
    const btn=document.getElementById(`${lottoKey}-sendBtn`);btn.disabled=true;btn.textContent='⏳ กำลังส่ง...';
    // Save to local history
    const slip={id:Date.now(),lotto:lottoKey,name,period,entries:[...entries],timestamp:new Date().toISOString(),totalBet:entries.reduce((s,e)=>s+e.amount,0)};
    const slips=loadSlips();slips.unshift(slip);saveSlips(slips);
    try{
      await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,period,lotto:lottoKey,entries})});
      document.getElementById(`${lottoKey}-sendSt`).textContent=`ส่งแล้ว ${new Date().toLocaleTimeString('th-TH')}`;
      toast(`ส่งโพยของ ${name} แล้ว ✓`);
    }catch{toast('ส่งแล้ว (บันทึกในเครื่อง)');}
    btn.disabled=false;btn.textContent='📤 ส่งโพย';
  };

  // ---- CREDIT ----
  document.getElementById(`${lottoKey}-credit`).oninput=e=>{e.target.value=e.target.value.replace(/\D/g,'');updCredit();};
  function updCredit(){
    const cr=parseInt(document.getElementById(`${lottoKey}-credit`).value)||0;
    const used=entries.reduce((s,e)=>s+e.amount,0),left=cr-used;
    const cl=document.getElementById(`${lottoKey}-cleft`);
    cl.textContent=(left>=0?'+':'')+`฿${fmt(left)}`;cl.style.color=left>=0?'var(--green)':'var(--red)';
    document.getElementById(`${lottoKey}-cbet`).textContent=`฿${fmt(used)}`;
  }

  // ---- RENDER ----
  function renderAll(){renderSum();renderTypeSummary();renderList();updCredit();updVis();}
  function renderSum(){
    const tb=entries.reduce((s,e)=>s+e.amount,0),tp=entries.reduce((s,e)=>s+e.amount*e.payout,0);
    document.getElementById(`${lottoKey}-sc`).textContent=entries.length;
    document.getElementById(`${lottoKey}-sb`).textContent='฿'+fmt(tb);
    document.getElementById(`${lottoKey}-sp`).textContent='฿'+fmt(tp);
    document.getElementById(`${lottoKey}-bbCount`).textContent=`${entries.length} รายการ`;
  }
  function renderTypeSummary(){
    const ts=document.getElementById(`${lottoKey}-ts`);ts.innerHTML='';
    const tots={};entries.forEach(e=>{tots[e.typeLabel]=(tots[e.typeLabel]||0)+e.amount;});
    let grand=0;
    Object.keys(tots).forEach(lb=>{grand+=tots[lb];const d=document.createElement('div');d.className='tsrow';d.innerHTML=`<span style="color:var(--mid)">${lb}</span><span style="font-weight:700;color:var(--navy)">฿${fmt(tots[lb])}</span>`;ts.appendChild(d);});
    document.getElementById(`${lottoKey}-grand`).textContent='฿'+fmt(grand);
  }
  function renderList(){
    const p1=document.getElementById(`${lottoKey}-p1`).value,b2=document.getElementById(`${lottoKey}-b2`).value;
    const dups=getDups(),tbl=document.getElementById(`${lottoKey}-tbl`);tbl.innerHTML='';
    const groups={};types.forEach(t=>{groups[t.id]=[];});entries.forEach(e=>groups[e.typeId].push(e));
    types.forEach(t=>{
      const list=groups[t.id];if(!list.length)return;
      const sec=document.createElement('div');sec.className='sec';
      const h=document.createElement('div');h.className='sec-head';h.textContent=t.label;sec.appendChild(h);
      const hr=document.createElement('div');hr.className='trow th';hr.innerHTML='<span>#</span><span>เลข</span><span>อัตรา</span><span>ถ้าถูก</span><span>บาท</span><span>ลบ</span>';sec.appendChild(hr);
      list.forEach((e,i)=>{
        const isDup=showDup&&dups.has(e.typeId+':'+e.number),win=showResult?getWin(e,p1,b2):null;
        const row=document.createElement('div');row.className='trow';
        row.style.background=e.id===flashId?'#e8f0e8':isDup?'#fff3cd':win>0?'var(--green-bg)':'';
        const ix=document.createElement('span');ix.style.cssText='font-size:10px;color:var(--mid);text-align:center';ix.textContent=i+1;
        const nb=document.createElement('span');nb.className='e-num';nb.textContent=e.number;
        const rt=document.createElement('span');rt.className='e-rate';rt.textContent=t.payout;
        const wd=document.createElement('span');wd.className='e-win';
        if(win!==null){wd.textContent=win>0?`+฿${fmt(win)}`:'—';if(win<=0)wd.style.color='var(--mid)';}
        else wd.textContent=`฿${fmt(e.amount*t.payout)}`;
        const ai=document.createElement('input');ai.className='amt-in';ai.type='text';ai.inputMode='numeric';ai.value=e.amount;
        ai.oninput=()=>{ai.value=ai.value.replace(/\D/g,'');e.amount=parseInt(ai.value)||0;renderAll();};
        const db=document.createElement('button');db.className='del-btn';db.textContent='ลบ';
        db.onclick=()=>{entries=entries.filter(x=>x.id!==e.id);showResult=false;document.getElementById(`${lottoKey}-resBox`).classList.add('hidden');renderAll();};
        row.appendChild(ix);row.appendChild(nb);row.appendChild(rt);row.appendChild(wd);row.appendChild(ai);row.appendChild(db);sec.appendChild(row);
      });
      tbl.appendChild(sec);
    });
    document.getElementById(`${lottoKey}-listTitle`).textContent=`โพย (${entries.length} รายการ)`;
  }
  function updVis(){
    const has=entries.length>0;
    ['bulkCard','cbar','acts','listCard','sbar','tsCard','checkCard','sendBar'].forEach(s=>document.getElementById(`${lottoKey}-${s}`).classList.toggle('hidden',!has));
    // empty state
    const em=document.getElementById(`${lottoKey}-empty`);if(em)em.classList.toggle('hidden',has);
  }

  // INIT
  updNL();updPrev();updVis();
}

// ===== SLIP TAB =====
let slipFilterMode='all';
function slipFilter(mode){
  slipFilterMode=mode;
  ['all','thai','lao'].forEach(m=>document.getElementById('sf-'+m).classList.toggle('on',m===mode));
  renderSlips();
}
function populatePeriods(){
  const slips=loadSlips();const periods=[...new Set(slips.map(s=>s.period))];
  const sel=document.getElementById('slipPeriod');const cur=sel.value;
  sel.innerHTML='<option value="">ทุกงวด</option>';
  periods.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;if(p===cur)o.selected=true;sel.appendChild(o);});
}
function renderSlips(){
  let slips=loadSlips();
  const search=document.getElementById('slipSearch').value.toLowerCase();
  const period=document.getElementById('slipPeriod').value;
  if(slipFilterMode!=='all')slips=slips.filter(s=>s.lotto===slipFilterMode);
  if(search)slips=slips.filter(s=>s.name.toLowerCase().includes(search));
  if(period)slips=slips.filter(s=>s.period===period);

  const el=document.getElementById('slipList');el.innerHTML='';
  if(!slips.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-txt">ยังไม่มีโพย</div></div>';return;}

  // Group by period
  const byPeriod={};
  slips.forEach(s=>{if(!byPeriod[s.period])byPeriod[s.period]=[];byPeriod[s.period].push(s);});

  Object.keys(byPeriod).forEach(period=>{
    const group=byPeriod[period];
    const totalBet=group.reduce((s,g)=>s+g.totalBet,0);
    const totalEntries=group.reduce((s,g)=>s+g.entries.length,0);
    const pg=document.createElement('div');pg.className='period-group';
    const pt=document.createElement('div');pt.className='period-title';pt.textContent=`งวด ${period}`;pg.appendChild(pt);
    const ps=document.createElement('div');ps.className='period-summary';
    ps.innerHTML=`<div class="ps-item"><div class="ps-lbl">รายการ</div><div class="ps-val">${totalEntries}</div></div><div class="ps-item"><div class="ps-lbl">โพย</div><div class="ps-val">${group.length}</div></div><div class="ps-item"><div class="ps-lbl">ยอดรวม</div><div class="ps-val">฿${fmt(totalBet)}</div></div>`;
    pg.appendChild(ps);
    group.forEach(slip=>{
      const sc=document.createElement('div');sc.className='slip-card';
      const dt=new Date(slip.timestamp).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'});
      sc.innerHTML=`
        <div class="slip-header">
          <div>
            <div class="slip-name">${slip.name}</div>
            <div class="slip-meta">${dt}</div>
          </div>
          <span class="slip-badge ${slip.lotto}">${slip.lotto==='thai'?'หวยไทย':'หวยลาว'}</span>
        </div>
        <div class="slip-totals">
          <div class="slip-tot-item"><div class="slip-tot-lbl">รายการ</div><div class="slip-tot-val">${slip.entries.length}</div></div>
          <div class="slip-tot-item"><div class="slip-tot-lbl">ยอดแทง</div><div class="slip-tot-val">฿${fmt(slip.totalBet)}</div></div>
          <div class="slip-tot-item"><div class="slip-tot-lbl">ถ้าถูกหมด</div><div class="slip-tot-val">฿${fmt(slip.entries.reduce((s,e)=>s+e.amount*e.payout,0))}</div></div>
        </div>`;
      // Expandable detail
      const detail=document.createElement('div');detail.className='slip-detail';
      const byType={};slip.entries.forEach(e=>{byType[e.typeLabel]=(byType[e.typeLabel]||0)+e.amount;});
      Object.keys(byType).forEach(lb=>{
        const r=document.createElement('div');r.className='slip-detail-row';
        r.innerHTML=`<span style="color:var(--mid)">${lb}</span><span style="font-weight:700">฿${fmt(byType[lb])}</span>`;detail.appendChild(r);
      });
      // Delete btn
      const delRow=document.createElement('div');delRow.style='display:flex;justify-content:flex-end;margin-top:4px';
      const db=document.createElement('button');db.className='btn-red btn-sm';db.textContent='ลบโพยนี้';
      db.onclick=(ev)=>{ev.stopPropagation();if(confirm('ลบโพยนี้?')){const all=loadSlips();saveSlips(all.filter(x=>x.id!==slip.id));renderSlips();populatePeriods();renderAgents();}};
      delRow.appendChild(db);detail.appendChild(delRow);
      sc.appendChild(detail);
      sc.onclick=()=>detail.classList.toggle('open');
      pg.appendChild(sc);
    });
    el.appendChild(pg);
  });
}

// ===== AGENT TAB =====
function addAgent(){
  const name=document.getElementById('agName').value.trim();
  const pct=parseFloat(document.getElementById('agPct').value)||0;
  if(!name){toast('กรอกชื่อนายหน้า',false);return;}
  if(pct<=0||pct>100){toast('เปอร์เซ็นต์ไม่ถูกต้อง',false);return;}
  const agents=loadAgents();
  agents.push({id:Date.now(),name,pct});
  saveAgents(agents);
  document.getElementById('agName').value='';
  document.getElementById('agPct').value='';
  renderAgents();toast(`เพิ่ม ${name} แล้ว`);
}
function renderAgents(){
  const agents=loadAgents();
  const slips=loadSlips();
  const el=document.getElementById('agentList');el.innerHTML='';

  let totalCom=0,totalBetAll=0;
  agents.forEach(ag=>{
    const mySlips=slips.filter(s=>s.name===ag.name);
    const myBet=mySlips.reduce((s,sl)=>s+sl.totalBet,0);
    const myCom=myBet*(ag.pct/100);
    totalCom+=myCom;totalBetAll+=myBet;
    const card=document.createElement('div');card.className='agent-card';
    card.innerHTML=`
      <div class="agent-avatar">${ag.name.charAt(0)}</div>
      <div style="flex:1">
        <div class="agent-name">${ag.name}</div>
        <div class="agent-pct">ค่าคอม ${ag.pct}%</div>
        <div class="agent-summary">
          <div class="agent-stat"><div class="agent-stat-lbl">ยอดโพย</div><div class="agent-stat-val">฿${fmt(myBet)}</div></div>
          <div class="agent-stat"><div class="agent-stat-lbl">ค่าคอม</div><div class="agent-stat-val" style="color:var(--goldd)">฿${fmt(myCom)}</div></div>
        </div>
        <div class="agent-actions">
          <button class="btn-red btn-sm" onclick="deleteAgent(${ag.id})">ลบ</button>
        </div>
      </div>`;
    el.appendChild(card);
  });

  if(!agents.length)el.innerHTML='<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-txt">ยังไม่มีนายหน้า</div></div>';

  document.getElementById('agTotalAgents').textContent=agents.length;
  document.getElementById('agTotalBet').textContent='฿'+fmt(totalBetAll);
  document.getElementById('agTotalCom').textContent='฿'+fmt(totalCom);
}
function deleteAgent(id){
  if(!confirm('ลบนายหน้านี้?'))return;
  saveAgents(loadAgents().filter(a=>a.id!==id));renderAgents();toast('ลบแล้ว');
}

// ===== INIT =====
makeLotteryApp('thai-body','thai');
makeLotteryApp('lao-body','lao');
renderAgents();
</script>
